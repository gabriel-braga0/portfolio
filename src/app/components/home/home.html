<div class="relative min-h-screen scanlines">
  <app-matrix-rain />
  <div class="scan-line"></div>

  <div
    class="fixed pointer-events-none z-[101] mix-blend-difference"
    [style.left.px]="coords.x - 12"
    [style.top.px]="coords.y - 12"
  >
    <div
      class="w-6 h-6 border border-neon-cyan rounded-full"
      style="box-shadow: 0 0 10px var(--neon-cyan)"
    ></div>
  </div>

  <app-header [time]="time" />

  <app-resume />

  <app-marquee [items]="items" />

  <app-about [tags]="aboutTags" />

  <app-projects [projects]="projects" />

  <app-skills [desc]="skills_desc" [skills]="skills" />

  <app-links />

  <app-footer />
</div>
